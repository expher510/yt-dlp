name: YouTube Downloader

on:
  workflow_dispatch: # لتشغيله يدوياً من علامة تبويب Actions

jobs:
  run-download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install yt-dlp

      - name: Execute Script
        # لاحظ هنا استخدمنا scripts/download.py لأن هذا هو الاسم في صورتك
        run: python scripts/download.py
