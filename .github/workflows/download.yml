name: Download YouTube Video

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube Video URL'
        required: true
        type: string
      cookies_b64:
        description: 'Cookies file content (Base64 encoded)'
        required: true
        type: string
      n8n_webhook:
        description: 'n8n webhook URL to notify on completion'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Setup yt-dlp (with FFmpeg + aria2 + EJS Node)
        uses: AnimMouse/setup-yt-dlp@v3
        # EJS Node يحل الـ JS challenge تلقائياً باستخدام Node.js

      - name: Decode and save cookies file
        run: |
          echo "${{ github.event.inputs.cookies_b64 }}" | base64 --decode > cookies.txt
          echo "✅ Cookies saved"
          head -2 cookies.txt

      - name: Download video
        id: download
        run: |
          mkdir -p downloads

          yt-dlp \
            --cookies cookies.txt \
            --output "downloads/%(title).100s.%(ext)s" \
            --format "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
            --merge-output-format mp4 \
            --no-playlist \
            --write-info-json \
            "${{ github.event.inputs.video_url }}"

          INFO_FILE=$(ls downloads/*.info.json 2>/dev/null | head -1)
          if [ -f "$INFO_FILE" ]; then
            TITLE=$(python3 -c "import json; d=json.load(open('$INFO_FILE')); print(d.get('title','Unknown'))")
            DURATION=$(python3 -c "import json; d=json.load(open('$INFO_FILE')); print(d.get('duration',0))")
            CHANNEL=$(python3 -c "import json; d=json.load(open('$INFO_FILE')); print(d.get('uploader','Unknown'))")
            THUMBNAIL=$(python3 -c "import json; d=json.load(open('$INFO_FILE')); print(d.get('thumbnail',''))")
          else
            TITLE="Unknown"; DURATION="0"; CHANNEL="Unknown"; THUMBNAIL=""
          fi

          VIDEO_FILE=$(ls downloads/*.mp4 2>/dev/null | head -1)
          FILE_SIZE=$(stat -c%s "$VIDEO_FILE" 2>/dev/null || echo "0")

          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "duration=$DURATION" >> $GITHUB_OUTPUT
          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT
          echo "thumbnail=$THUMBNAIL" >> $GITHUB_OUTPUT
          echo "file_size=$FILE_SIZE" >> $GITHUB_OUTPUT

      - name: Upload video as artifact
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-video
          path: downloads/*.mp4
          retention-days: 1

      - name: Notify n8n - Success
        if: success()
        run: |
          curl -s -X POST "${{ github.event.inputs.n8n_webhook }}" \
            -H "Content-Type: application/json" \
            -d '{
              "status": "success",
              "title": ${{ toJson(steps.download.outputs.title) }},
              "channel": ${{ toJson(steps.download.outputs.channel) }},
              "duration": ${{ toJson(steps.download.outputs.duration) }},
              "thumbnail": ${{ toJson(steps.download.outputs.thumbnail) }},
              "file_size": ${{ toJson(steps.download.outputs.file_size) }},
              "video_url": ${{ toJson(github.event.inputs.video_url) }},
              "artifact_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }'

      - name: Notify n8n - Failure
        if: failure()
        run: |
          curl -s -X POST "${{ github.event.inputs.n8n_webhook }}" \
            -H "Content-Type: application/json" \
            -d '{
              "status": "error",
              "message": "Download failed. Check GitHub Actions logs.",
              "video_url": ${{ toJson(github.event.inputs.video_url) }},
              "artifact_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }'
