name: Download YouTube Video

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL'
        required: true
      folder_id:
        description: 'Google Drive Folder ID'
        required: true

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Setup yt-dlp
        uses: AnimMouse/setup-yt-dlp@v3

      - name: Setup YouTube cookies
        uses: AnimMouse/setup-yt-dlp/cookies@v3
        with:
          cookies: ${{ secrets.YOUTUBE_COOKIES }}

      - name: Download Video
        run: yt-dlp -o "video.%(ext)s" "${{ github.event.inputs.url }}"

      - name: Install dependencies
        run: pip install google-auth google-auth-httplib2 google-api-python-client

      - name: Upload to Google Drive
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          DRIVE_FOLDER_ID: ${{ github.event.inputs.folder_id }}
        run: |
          cat > upload.py << 'PYEOF'
          import os
          import json
          import glob
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          credentials_json = json.loads(os.environ['GOOGLE_CREDENTIALS'])
          credentials = service_account.Credentials.from_service_account_info(
              credentials_json,
              scopes=['https://www.googleapis.com/auth/drive']
          )
          service = build('drive', 'v3', credentials=credentials)
          files = glob.glob('video.*')
          for file_path in files:
              file_metadata = {
                  'name': os.path.basename(file_path),
                  'parents': [os.environ['DRIVE_FOLDER_ID']]
              }
              media = MediaFileUpload(file_path, resumable=True)
              result = service.files().create(
                  body=file_metadata,
                  media_body=media,
                  fields='id'
              ).execute()
              print(f'Uploaded! ID: {result.get("id")}')
          PYEOF
          python3 upload.py

      - name: Update YouTube cookies
        uses: AnimMouse/setup-yt-dlp/cookies/update@v3
        with:
          cookies_secret_name: YOUTUBE_COOKIES
          token: ${{ secrets.GH_PAT }}
