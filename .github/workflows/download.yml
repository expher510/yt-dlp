name: YouTube Downloader

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'رابط الفيديو'
        required: true
      cookies_content:
        description: 'محتوى الكوكيز (Netscape format)'
        required: false
      n8n_webhook:
        description: 'رابط الويب هوك للرد بالنتيجة'
        required: false

jobs:
  run-download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          pip install yt-dlp

      - name: Execute Script
        env:
          # تمرير المدخلات كمتغيرات بيئة للبايثون
          VIDEO_URL: ${{ github.event.inputs.video_url }}
          COOKIES_DATA: ${{ github.event.inputs.cookies_content }}
          N8N_WEBHOOK: ${{ github.event.inputs.n8n_webhook }}
        run: python scripts/download.py
