name: Video Downloader from n8n
on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'رابط الفيديو من يوتيوب'
        required: true
      cookies_content:
        description: 'محتوى ملف الكوكيز'
        required: true

jobs:
  run-downloader:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install -U yt-dlp
          # إذا كان الكود بتاعك محتاج مكتبات تانية زي quickjs ضيفها هنا

      - name: Create Cookies File
        run: |
          echo "${{ github.event.inputs.cookies_content }}" > cookies.txt

      - name: Execute Download Script
        env:
          VIDEO_URL: ${{ github.event.inputs.video_url }}
        run: |
          # تشغيل السكربت بتاعك اللي انت بعتهولي
          python your_script_name.py

      - name: Upload Video to Telegram or Drive
        run: |
          # هنا بنستخدم المتغير اللي الكود بتاعك كتبه في الـ ENV
          echo "جاري التعامل مع الملف المستخرج: $VIDEO_FILE"
          # يمكنك إضافة كود الرفع هنا (سواء لـ n8n Webhook أو Telegram)
