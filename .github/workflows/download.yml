name: Download YouTube Video

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube Video URL'
        required: true
        type: string
      cookies_b64:
        description: 'Cookies file content (Base64 encoded)'
        required: true
        type: string
      n8n_webhook:
        description: 'n8n webhook URL (for file upload AND error notification)'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Setup yt-dlp (with FFmpeg + aria2 + EJS Node)
        uses: AnimMouse/setup-yt-dlp@v3

      - name: Decode and save cookies file
        run: |
          echo "${{ github.event.inputs.cookies_b64 }}" | base64 --decode > cookies.txt

      - name: Download video
        id: download
        run: |
          mkdir -p downloads

          yt-dlp \
            --cookies cookies.txt \
            --output "downloads/%(title).100s.%(ext)s" \
            --format "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
            --merge-output-format mp4 \
            --no-playlist \
            --write-info-json \
            "${{ github.event.inputs.video_url }}"

          VIDEO_FILE=$(ls downloads/*.mp4 2>/dev/null | head -1)
          echo "video_file=$VIDEO_FILE" >> $GITHUB_OUTPUT
          echo "✅ Downloaded: $VIDEO_FILE"

        - name: Upload to GitHub Release & notify n8n
    run: |
      VIDEO_FILE="${{ steps.download.outputs.video_file }}"
      FILENAME=$(basename "$VIDEO_FILE")
      TAG="video-$(date +%s)"
  
      # إنشاء Release
      RELEASE=$(curl -s -X POST \
        -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
        -H "Content-Type: application/json" \
        "https://api.github.com/repos/${{ github.repository }}/releases" \
        -d "{\"tag_name\":\"$TAG\",\"name\":\"$FILENAME\",\"draft\":false}")
  
      UPLOAD_URL=$(echo $RELEASE | jq -r '.upload_url' | sed 's/{.*}//')
      RELEASE_ID=$(echo $RELEASE | jq -r '.id')
  
      # رفع الفيديو على الـ Release
      curl -s -X POST \
        -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
        -H "Content-Type: video/mp4" \
        --data-binary "@$VIDEO_FILE" \
        "${UPLOAD_URL}?name=${FILENAME}" > /dev/null
  
      DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/$TAG/$(python3 -c 'import urllib.parse,sys;print(urllib.parse.quote(sys.argv[1]))' "$FILENAME")"
  
      echo "📎 Release URL: $DOWNLOAD_URL"
  
      # بعت JSON بس للـ n8n
      curl -s -X POST "${{ github.event.inputs.n8n_webhook }}" \
        -H "Content-Type: application/json" \
        -d "{
          \"status\": \"success\",
          \"download_url\": \"$DOWNLOAD_URL\",
          \"release_id\": \"$RELEASE_ID\",
          \"filename\": \"$FILENAME\",
          \"video_url\": \"${{ github.event.inputs.video_url }}\"
        }"
      echo "✅ Notified n8n"
